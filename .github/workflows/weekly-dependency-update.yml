name: Weekly Dependency Update

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  dependency-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Claude dependency update agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch_prefix: "deps/"
          claude_args: "--max-turns 20"
          prompt: |
            You are a dependency maintenance agent for the Go module github.com/tommzn/go-config.

            Your job is to update all dependencies to their latest versions, verify the project
            still works, fix any issues, and open a pull request for review.

            Follow these steps exactly:

            ## 1. Capture baseline
            - Run `cat go.mod` and save the current dependency versions for the changelog.
            - Run `go list -u -m all 2>/dev/null | awk '$3 != ""'` to list all available updates.
              If there are no updates available, output "No dependency updates available." and stop.

            ## 2. Create a dated branch
            - Create and switch to a new branch named `deps/weekly-update-<YYYY-MM-DD>`
              using today's date (use `date +%Y-%m-%d` to get it).

            ## 3. Update dependencies
            - Run `go get -u ./...` to update all dependencies.
            - Run `go mod tidy` to clean up go.mod and go.sum.
            - Run `cat go.mod` again to capture the new versions.

            ## 4. Run tests
            - Run `go build ./...` to verify compilation.
            - Run `go test ./... -count=1` to run the full test suite.

            ## 5. Fix failures (if any)
            - If tests fail, carefully read the error output and fix the root cause in the
              source code. Do NOT downgrade dependencies to avoid failures.
            - Re-run `go test ./... -count=1` after each fix. Repeat until all tests pass.
            - If you cannot fix a failure after 3 attempts, document the unresolved issue
              clearly in the PR description but still open the PR.

            ## 6. Commit
            - Stage all changed files: go.mod, go.sum, and any source files you fixed.
            - Commit using the prefix `fix:` (required for automated patch version bump) with
              a concise message listing the main dependency changes.

            ## 7. Build the PR description
            Construct a detailed PR description using this exact structure:

            ```
            ## Dependency Updates

            | Package | Previous | Updated |
            |---------|----------|---------|
            <one row per changed direct or indirect dependency>

            ## Go Version
            <mention if the Go toolchain version changed, otherwise omit this section>

            ## Test Results
            <"All tests passed." or a summary of any issues and fixes applied>

            ## Notes
            <any deprecation warnings or notable findings from the update, e.g. deprecated packages>
            ```

            ## 8. Open pull request
            - Push the branch and open a pull request against `main`.
            - Use title: `fix: weekly dependency update <YYYY-MM-DD>`
            - Use the description built in step 7.
            - Do NOT merge the PR — leave it open for manual review.
